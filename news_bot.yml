name: Daily Gemini News Bot

on:
  schedule:
    # 한국 시간(KST) 오전 7시는 UTC로 전날 오후 10시입니다.
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

# 최신 Node.js 24 환경을 워크플로우 전체에 미리 선언합니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    # Node.js 24를 지원하는 최신 버전으로 업그레이드 (@v4 -> @v5)
    - name: 코드 체크아웃
      uses: actions/checkout@v5

    # Node.js 24를 지원하는 최신 버전으로 업그레이드 (@v5 -> @v6)
    - name: 파이썬 설정
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: 최신 제미나이 라이브러리 설치
      run: |
        pip install google-genai

    - name: 뉴스 봇 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
      run: python main.py
